deployment_config_git:            "https://github.com/toffee/smartserver.git"
deployment_branch_git:            "pluto"
github_auth_token:                "{{vault_github_auth_token}}"

mailserver_username:              "pluto@toffee.ro"
mailserver_password:              "{{vault_mailserver_password}}"
mailserver_host:                  "dwarf.megahost.ro"
mailserver_port:                  "465"

ssl_certificate:                  "letsencrypt"              # selfsigned, letsencrypt

form_auth_passphrase:             "{{vault_form_auth_passphrase}}"

samba_enabled:                    no
monitoring_enabled:               no
grafana_enabled:                  no
netdata_enabled:                  no
librenms_enabled:                 no
dns_forward_ip_addresses:         [ "192.168.120.1" ]
dns_type:                         "dnsmasq"
dhcp_enabled:                     no
pihole_enabled:                   no
mobile_vpn_internal_port:         "51821"
mobile_vpn_public_port:           "51821"
mobile_vpn_public_domain:         "tofans.go.ro"
influxdb_enabled:                 no
shared_mariadb_password:          "{{vault_shared_mariadb_password}}"
mosquitto_enabled:                no
dlna_enabled:                     no
nextcloud_enabled:                no
#nextcloud_instance_id:            "{{vault_nextcloud_instance_id}}"
#nextcloud_password_salt:          "{{vault_nextcloud_password_salt}}"
#nextcloud_secret:                 "{{vault_nextcloud_secret}}"
#nextcloud_mariadb_password:       "{{vault_nextcloud_mariadb_password}}"
#nextcloud_admin_password:         "{{vault_nextcloud_admin_password}}"
openhab_enabled:                  no
update_service_enabled:           no
system_service_enabled:           no

backup_syncs: [
    {
        name: "smartserver",
        type: "rsync",
        schedule: { hour: "0", minute: "0" },
        destination: "{{backup_path}}smartserver/",
        sources: [
            { path: "{{base_path}}", filter: [ "- /var/**", "- /tmp/**" ] },
            { path: "{{base_path}}", filter: [ "- /var/lib/containers/**", "+ /var/**", "+ /tmp/**" ], options: [ "--local-no-check-updated" ] }
        ],
        bandwidth_limit: "10M"
    }
]

speedtest_enabled:                no
weather_service_enabled:          no